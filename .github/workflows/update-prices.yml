name: Sigara Fiyat Güncelle

on:
  schedule:
    # Günde 4 kez çalış (UTC): 06:00, 12:00, 18:00, 00:00
    # Türkiye saati: 09:00, 15:00, 21:00, 03:00
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Manuel tetikleme

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scraper.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --staged --quiet; then
            echo "Fiyatlarda değişiklik yok"
          else
            git commit -m "Fiyatlar güncellendi - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
