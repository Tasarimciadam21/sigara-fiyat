name: Sigara Fiyat Güncelle

on:
  schedule:
    # Günde 6 kez çalış (UTC) — Türkiye saati parantez içinde
    # Zam haberleri genelde sabah/öğlen yayınlanır
    - cron: '0 4,7,10,13,16,21 * * *'  # TR: 07, 10, 13, 16, 19, 00
  workflow_dispatch: # Manuel tetikleme

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scraper.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --staged --quiet; then
            echo "Fiyatlarda değişiklik yok"
          else
            git commit -m "Fiyatlar güncellendi - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
